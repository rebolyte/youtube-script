[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-yaml" },
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "oxlint", name = "oxlint", language = "system", entry = "bunx oxlint", pass_filenames = false, types_or = [
    "javascript",
    "jsx",
    "ts",
    "tsx",
  ] },
  { id = "oxfmt", name = "oxfmt", language = "system", entry = "bunx oxfmt --check", pass_filenames = false, types_or = [
    "javascript",
    "jsx",
    "ts",
    "tsx",
  ] },
]
